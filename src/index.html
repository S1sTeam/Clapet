<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clapet</title>
</head>
<body>
<div id="splash">
  <div id="splash-bg"></div>
  <div id="splash-inner">
    <div id="splash-icon-wrap">
      <svg id="splash-icon" viewBox="0 0 24 24" width="64" height="64" fill="#fbf1c7"><path clip-rule="evenodd" d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949zM6 10.949h1.488V8.102H6v2.847zm10.51 0H18V8.102h-1.49v2.847z"/></svg>
    </div>
    <div id="splash-title">Clapet</div>
    <div id="splash-subtitle">desktop pet</div>
    <div id="splash-dots">
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
    </div>
  </div>
</div>
<div id="app">
  <!-- ── Launcher (Fluent 2) ── -->
  <div id="launcher">
    <header id="l-header">
      <div id="l-header-left">
        <svg id="l-app-icon" viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path clip-rule="evenodd" d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949zM6 10.949h1.488V8.102H6v2.847zm10.51 0H18V8.102h-1.49v2.847z"/></svg>
        <span id="l-title">Clapet</span>
      </div>
      <div id="l-search">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="#888" stroke-width="1.4" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
        <input type="text" id="l-search-input" placeholder="Поиск" />
      </div>
      <div id="l-controls">
        <button class="tb-btn" id="minimize-btn">
          <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><path d="M2.5 6h7"/></svg>
        </button>
        <button class="tb-btn" id="close-btn">
          <svg viewBox="0 0 12 12" width="10" height="10"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>
    <nav id="l-tabs">
      <button class="l-tab active" data-tab="tab-launch">
        <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M8 6.5v7l5.5-3.5L8 6.5z"/></svg>
        <span>Запуск</span>
      </button>
      <button class="l-tab" data-tab="tab-pet-settings">
        <svg viewBox="0 0 192.896 192.896" width="14" height="14" fill="none" stroke="currentColor" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"><path d="M182.792,43.917c-6.351-6.351-14.754-9.916-23.724-10.079c-0.153-8.791-3.668-17.315-10.097-23.742C142.461,3.586,133.801,0,124.587,0c-9.214,0-17.874,3.585-24.382,10.094c-6.519,6.516-10.108,15.179-10.108,24.393c0,8.418,2.995,16.375,8.488,22.662l-41.43,41.439c-6.283-5.491-14.245-8.488-22.667-8.488c-9.213,0-17.875,3.588-24.39,10.104c-6.511,6.509-10.096,15.168-10.096,24.382c0,9.215,3.588,17.878,10.104,24.394c6.353,6.351,14.756,9.915,23.725,10.078c0.154,8.791,3.669,17.315,10.096,23.743c6.512,6.51,15.172,10.095,24.384,10.096c0.001,0,0.002,0,0.003,0c9.211,0,17.869-3.585,24.379-10.094c6.519-6.516,10.109-15.179,10.109-24.392c0-8.423-3-16.384-8.49-22.662l41.432-41.442c6.284,5.491,14.247,8.489,22.669,8.489c9.212,0,17.874-3.588,24.388-10.103c6.511-6.508,10.096-15.167,10.096-24.381C192.895,59.097,189.307,50.433,182.792,43.917z"/></svg>
        <span>Питомец</span>
      </button>
      <button class="l-tab" data-tab="tab-ai">
        <svg viewBox="0 0 48 48" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.9,2h-.4L7.6,6.6a1,1,0,0,0-.6.9v7.4l-.6.5-4,3.3a.8.8,0,0,0-.4.8v9a.9.9,0,0,0,.4.8l4,3.3.6.5v7.4a1,1,0,0,0,.6.9l9.9,4.5h.4l.6-.2,4-2.7V25.5H21a1.5,1.5,0,0,1,0-3h1.5V4.9l-4-2.7Z"/><path d="M45.6,18.7l-4-3.3-.6-.5V7.5a1,1,0,0,0-.6-.9L30.5,2.1h-.4l-.6.2-4,2.7V22.5H27a1.5,1.5,0,0,1,0,3H25.5V43.1l4,2.7.6.2h.4l9.9-4.5a1,1,0,0,0,.6-.9V33.1l.6-.5,4-3.3a.9.9,0,0,0,.4-.8v-9A.8.8,0,0,0,45.6,18.7Z"/></svg>
        <span>AI</span>
      </button>
      <button class="l-tab" data-tab="tab-main-settings">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c-.6 0-1 .4-1 1v1.1c-.9.2-1.7.6-2.4 1.2L7.8 4.6c-.5-.4-1.2-.3-1.6.2L4.8 6.8c-.4.5-.3 1.2.2 1.6l.8.6c-.3.7-.5 1.5-.5 2.3s.2 1.6.5 2.3l-.8.6c-.5.4-.6 1.1-.2 1.6l1.4 2c.4.5 1.1.6 1.6.2l.8-.6c.7.5 1.5.9 2.4 1.1V21c0 .6.4 1 1 1s1-.4 1-1v-1.1c.9-.2 1.7-.6 2.4-1.2l.8.6c.5.4 1.2.3 1.6-.2l1.4-2c.4-.5.3-1.2-.2-1.6l-.8-.6c.3-.7.5-1.5.5-2.3s-.2-1.6-.5-2.3l.8-.6c.5-.4.6-1.1.2-1.6l-1.4-2c-.4-.5-1.1-.6-1.6-.2l-.8.6c-.7-.5-1.5-.9-2.4-1.1V3c0-.6-.4-1-1-1z"/><circle cx="12" cy="12" r="2.5"/></svg>
        <span>Настройки</span>
      </button>
    </nav>
    <div id="l-body">
      <main id="content">
        <section id="tab-launch" class="tab-content active">
          <h2>Запуск питомца</h2>
          <div class="card elevation-2">
            <div id="preview-area">
              <svg id="preview-svg" viewBox="0 0 220 240">
                <rect class="pf" x="45" y="100" width="130" height="90" fill="#df7959"/>
                <rect class="pf" x="55" y="110" width="110" height="60" fill="#df7959" opacity="0.2"/>
                <g id="preview-eyes">
                  <rect x="73" y="135" width="30" height="20" fill="#1A1A1A"/>
                  <rect x="119" y="135" width="30" height="20" fill="#1A1A1A"/>
                </g>
                <rect class="pf" x="58" y="185" width="14" height="22" fill="#df7959"/>
                <rect class="pf" x="80" y="185" width="14" height="22" fill="#df7959"/>
                <rect class="pf" x="128" y="185" width="14" height="22" fill="#df7959"/>
                <rect class="pf" x="150" y="185" width="14" height="22" fill="#df7959"/>
                <rect class="pf" x="25" y="132" width="20" height="20" fill="#df7959"/>
                <rect class="pf" x="175" y="132" width="20" height="20" fill="#df7959"/>
              </svg>
            </div>
            <button class="btn" id="launch-btn">
              <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M8 6.5v7l5.5-3.5L8 6.5z"/></svg>
              Запустить
            </button>
          </div>
        </section>

        <section id="tab-pet-settings" class="tab-content">
          <h2>Питомец</h2>
          <div class="card elevation-2">
            <div class="setting-row">
              <label>Скорость дыхания</label>
              <div class="setting-control">
                <input type="range" id="bs-input" min="0.5" max="6" step="0.1" value="3" />
                <span class="range-val" id="bs-val">3.0</span>
              </div>
            </div>
            <div class="setting-row">
              <label>Амплитуда дыхания</label>
              <div class="setting-control">
                <input type="range" id="ba-input" min="1" max="15" step="1" value="6" />
                <span class="range-val" id="ba-val">6</span>
              </div>
            </div>
            <div class="setting-row">
              <label>Скорость ходьбы</label>
              <div class="setting-control">
                <input type="range" id="ws-input" min="0.2" max="3" step="0.1" value="1" />
                <span class="range-val" id="ws-val">1.0</span>
              </div>
            </div>
            <div class="setting-row">
              <label>Цвет питомца</label>
              <div class="color-picker-row">
                <div class="color-swatches" id="pet-color-swatches">
                  <button class="color-swatch active" data-color="#df7959" style="background:#df7959" title="Оранжевый"></button>
                  <button class="color-swatch" data-color="#fbf1c7" style="background:#fbf1c7" title="Кремовый"></button>
                  <button class="color-swatch" data-color="#fe8019" style="background:#fe8019" title="Оранжевый яркий"></button>
                  <button class="color-swatch" data-color="#b8bb26" style="background:#b8bb26" title="Зелёный"></button>
                  <button class="color-swatch" data-color="#83a598" style="background:#83a598" title="Голубой"></button>
                  <button class="color-swatch" data-color="#d3869b" style="background:#d3869b" title="Розовый"></button>
                  <input type="color" id="custom-color-input" value="#df7959" title="Свой цвет" />
                </div>
              </div>
            </div>
            <div class="setting-row">
              <label class="toggle-row">
                <span>Автоматические мысли</span>
                <span class="toggle-switch" id="auto-think-toggle"><span class="toggle-slider"></span></span>
              </label>
            </div>
            <div class="setting-row">
              <label class="toggle-row">
                <span>Автоматическая ходьба</span>
                <span class="toggle-switch" id="auto-walk-toggle"><span class="toggle-slider"></span></span>
              </label>
            </div>
            <div class="setting-row">
              <label class="toggle-row">
                <span>Озвучка ответов (TTS)</span>
                <span class="toggle-switch" id="tts-toggle"><span class="toggle-slider"></span></span>
              </label>
            </div>
            <div class="setting-row">
              <label>Прозрачность питомца</label>
              <div class="setting-control">
                <input type="range" id="pet-opacity" min="0.2" max="1" step="0.05" value="1" />
                <span class="range-val" id="pet-opacity-val">100%</span>
              </div>
            </div>
            <div class="stat-card">
              <h3>Статистика</h3>
              <div class="stat-row"><span>Уровень</span><span id="stat-level">1</span></div>
              <div class="stat-row"><span>Опыт</span><span id="stat-xp">0 / 30</span></div>
              <div class="stat-row"><span>Съедено печенья</span><span id="stat-cookies">0</span></div>
              <div class="stat-row"><span>До кормёжки</span><span id="stat-cooldown">—</span></div>
            </div>
          </div>
        </section>

        <section id="tab-ai" class="tab-content">
          <h2>AI</h2>
          <div class="card elevation-2">
            <div class="setting-row">
              <label>Провайдер</label>
              <div class="custom-select" id="launcher-provider-select">
                <div class="cs-trigger" id="launcher-cs-trigger">
                  <div class="cs-trigger-icon" id="launcher-cs-icon"></div>
                  <span class="cs-trigger-label" id="launcher-cs-label">OpenAI</span>
                  <svg class="cs-chevron" viewBox="0 0 12 12" width="10" height="10"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                </div>
                <div class="cs-dropdown hidden" id="launcher-cs-dropdown"></div>
              </div>
              <select id="launcher-provider" style="display:none"></select>
            </div>
            <div class="setting-row" id="launcher-custom-url-row" style="display:none">
              <label>Base URL</label>
              <div class="key-row">
                <input type="text" id="launcher-custom-url" placeholder="https://api.example.com/v1" />
              </div>
            </div>
            <div class="setting-row">
              <label>API Key</label>
              <div class="key-row">
                <input type="password" id="launcher-api-key" placeholder="sk-..." />
                <button id="launcher-toggle-key">
                  <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 3C4.5 3 1.5 5.5 0 8c1.5 2.5 4.5 5 8 5s6.5-2.5 8-5c-1.5-2.5-4.5-5-8-5z" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>
                </button>
              </div>
            </div>
            <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:8px">
              <button id="launcher-verify-btn">Проверить</button>
              <span id="launcher-key-status"></span>
            </div>
            <div class="setting-row" id="launcher-model-row" style="display:none">
              <label>Модель</label>
              <div class="custom-select" id="launcher-model-select">
                <div class="cs-trigger" id="launcher-model-cs-trigger">
                  <span class="cs-trigger-label" id="launcher-model-cs-label">Выберите модель</span>
                  <svg class="cs-chevron" viewBox="0 0 12 12" width="10" height="10"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                </div>
                <div class="cs-dropdown hidden" id="launcher-model-cs-dropdown"></div>
              </div>
              <select id="launcher-model-native" style="display:none"></select>
              <input type="text" id="launcher-model-input" style="display:none;margin-top:4px" placeholder="Введите модель" />
            </div>
            <div class="setting-row" id="ai-status-row" style="display:none;border-top:1px solid rgba(255,255,255,0.06);padding-top:12px;margin-top:8px">
              <div style="display:flex;align-items:center;gap:6px">
                <span id="ai-status-dot" style="width:8px;height:8px;border-radius:50%;background:#a89984;flex-shrink:0"></span>
                <span id="ai-status-text" style="color:#a89984;font-size:11px">Не настроен</span>
              </div>
            </div>
          </div>
        </section>

        <section id="tab-main-settings" class="tab-content">
          <h2>Настройки</h2>
          <div class="card elevation-2">
            <div class="setting-row">
              <label class="toggle-row">
                <span>Автозапуск питомца</span>
                <span class="toggle-switch" id="auto-launch-toggle"><span class="toggle-slider"></span></span>
              </label>
            </div>
            <div class="setting-row">
              <label class="toggle-row">
                <span>Поверх всех окон</span>
                <span class="toggle-switch" id="always-on-top-toggle"><span class="toggle-slider"></span></span>
              </label>
            </div>
            <div class="setting-row">
              <label class="toggle-row">
                <span>Показывать частицы</span>
                <span class="toggle-switch" id="particles-toggle"><span class="toggle-slider"></span></span>
              </label>
            </div>
            <div class="setting-row">
              <label class="toggle-row">
                <span>Плавающие буквы</span>
                <span class="toggle-switch" id="float-letters-toggle"><span class="toggle-slider"></span></span>
              </label>
            </div>
            <div class="setting-row">
              <label>Размер шрифта</label>
              <div class="setting-control">
                <input type="range" id="font-size-input" min="10" max="18" step="1" value="13" />
                <span class="range-val" id="font-size-val">13px</span>
              </div>
            </div>
            <div class="setting-row">
              <label>Акцентный цвет</label>
              <div class="color-picker-row">
                <div class="color-swatches" id="accent-swatches">
                  <button class="color-swatch active" data-color="#FF8A8A" style="background:#FF8A8A" title="Красный"></button>
                  <button class="color-swatch" data-color="#FFB882" style="background:#FFB882" title="Оранжевый"></button>
                  <button class="color-swatch" data-color="#FFE082" style="background:#FFE082" title="Жёлтый"></button>
                  <button class="color-swatch" data-color="#C5E099" style="background:#C5E099" title="Лайм"></button>
                  <button class="color-swatch" data-color="#8FDBA8" style="background:#8FDBA8" title="Зелёный"></button>
                  <button class="color-swatch" data-color="#8FD6E0" style="background:#8FD6E0" title="Голубой"></button>
                  <button class="color-swatch" data-color="#8AB8FF" style="background:#8AB8FF" title="Синий"></button>
                  <button class="color-swatch" data-color="#B8A8FF" style="background:#B8A8FF" title="Фиолетовый"></button>
                  <button class="color-swatch" data-color="#FFA8D8" style="background:#FFA8D8" title="Розовый"></button>
                  <input type="color" id="accent-color-input" value="#fe8019" title="Свой цвет" />
                </div>
              </div>
            </div>
            <div class="setting-row" style="flex-direction:column;align-items:stretch;gap:6px">
              <label class="toggle-row" style="width:100%">
                <span>Прокси</span>
                <span class="toggle-switch" id="proxy-toggle"><span class="toggle-slider"></span></span>
              </label>
              <div id="proxy-details" style="display:none;flex-direction:column;gap:5px;padding-top:4px">
                <div style="display:flex;gap:4px;align-items:center">
                  <div class="custom-select" id="proxy-protocol-select" style="flex:0 0 90px;min-width:0">
                    <div class="cs-trigger" id="proxy-protocol-trigger" style="padding:3px 6px;font-size:11px;min-width:0">
                      <span class="cs-trigger-label" id="proxy-protocol-label" style="font-size:11px">HTTP</span>
                      <svg class="cs-chevron" viewBox="0 0 12 12" width="8" height="8"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                    </div>
                    <div class="cs-dropdown hidden" id="proxy-protocol-dropdown"></div>
                  </div>
                  <select id="proxy-protocol" style="display:none">
                    <option value="http">HTTP</option>
                    <option value="https">HTTPS</option>
                    <option value="socks5">SOCKS5</option>
                  </select>
                  <input type="text" id="proxy-host" placeholder="Хост" style="flex:1;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:4px 6px;font:inherit;font-size:11px;color:var(--fg);outline:none;min-width:0" />
                  <input type="number" id="proxy-port" placeholder="Порт" style="flex:0 0 70px;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:4px 6px;font:inherit;font-size:11px;color:var(--fg);outline:none" />
                </div>
                <div style="display:flex;gap:4px">
                  <input type="text" id="proxy-user" placeholder="Логин (опц.)" style="flex:1;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:4px 6px;font:inherit;font-size:11px;color:var(--fg);outline:none;min-width:0" />
                  <input type="password" id="proxy-pass" placeholder="Пароль (опц.)" style="flex:1;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:4px 6px;font:inherit;font-size:11px;color:var(--fg);outline:none;min-width:0" />
                </div>
                <div style="display:flex;gap:6px;align-items:center">
                  <button class="btn" id="proxy-test-btn" style="font-size:11px;padding:3px 10px">Тест</button>
                  <span id="proxy-status" style="font-size:10px;color:var(--fg-dim)"></span>
                </div>
              </div>
            </div>
            <button class="btn" id="reset-settings-btn" style="margin-top:8px">Сбросить все настройки</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- ── Pet Mode ── -->
  <div id="pet-mode" style="display:none">
    <div id="pet-mode-inner">
      <div id="pet-container" class="state-idle">
        <div id="thought-bubble" class="hidden">
          <span id="thought-text"></span>
        </div>

        <svg id="pet-svg" viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
            </filter>
          </defs>

          <g id="body" class="body-part">
            <rect x="45" y="100" width="130" height="90" rx="0" fill="#df7959" filter="url(#shadow)"/>
            <rect x="55" y="110" width="110" height="60" rx="0" fill="#df7959" opacity="0.2"/>
          </g>

          <g id="head" class="head-part">
            <g class="eye-group">
              <g id="eye-left">
                <rect id="eye-rect-left" x="73" y="135" width="30" height="20" rx="0" fill="#1A1A1A"/>
              </g>
              <g id="eye-right">
                <rect id="eye-rect-right" x="119" y="135" width="30" height="20" rx="0" fill="#1A1A1A"/>
              </g>
            </g>

            <g id="sleep-eyes" class="hidden">
              <rect x="76" y="143" width="24" height="3" rx="0" fill="#1A1A1A" transform="rotate(-3, 88, 144.5)"/>
              <rect x="122" y="143" width="24" height="3" rx="0" fill="#1A1A1A" transform="rotate(3, 134, 144.5)"/>
            </g>

            <g id="mouth" style="opacity:0">
              <path d="M 100 164 Q 110 172, 120 164" stroke="#1A1A1A" stroke-width="2.5" fill="none" stroke-linecap="square"/>
            </g>

            <g id="grab-eyes" style="opacity:0">
              <polyline points="78,137 98,145 78,153" stroke="#1A1A1A" stroke-width="5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
              <polyline points="144,137 124,145 144,153" stroke="#1A1A1A" stroke-width="5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
            </g>

            <g id="happy-eyes" style="opacity:0">
              <polyline points="82,147 88,139 94,147" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
              <polyline points="128,147 134,139 140,147" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
            </g>
          </g>

          <g id="think-eyes" style="opacity:0">
            <circle cx="88" cy="137" r="5" fill="#1A1A1A"/>
            <circle cx="134" cy="137" r="5" fill="#1A1A1A"/>
          </g>

          <g id="glasses" style="opacity:0">
            <circle cx="88" cy="139" r="13" stroke="#333" stroke-width="2.5" fill="none"/>
            <circle cx="134" cy="139" r="13" stroke="#333" stroke-width="2.5" fill="none"/>
            <path d="M 101 139 Q 111 136, 121 139" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="square"/>
            <line x1="75" y1="135" x2="66" y2="128" stroke="#333" stroke-width="2.5" stroke-linecap="square"/>
            <line x1="147" y1="135" x2="156" y2="128" stroke="#333" stroke-width="2.5" stroke-linecap="square"/>
          </g>

          <g id="legs" class="legs-part">
            <rect id="leg-fl" x="58" y="185" width="14" height="22" rx="0" fill="#df7959"/>
            <rect id="leg-bl" x="80" y="185" width="14" height="22" rx="0" fill="#df7959"/>
            <rect id="leg-fr" x="128" y="185" width="14" height="22" rx="0" fill="#df7959"/>
            <rect id="leg-br" x="150" y="185" width="14" height="22" rx="0" fill="#df7959"/>
          </g>

          <g id="left-paw" class="paw left-paw">
            <rect x="25" y="132" width="20" height="20" rx="0" fill="#df7959"/>
          </g>
          <g id="right-paw" class="paw right-paw">
            <rect x="175" y="132" width="20" height="20" rx="0" fill="#df7959"/>
          </g>
        </svg>

        <div id="radial-menu" class="hidden">
          <button class="radial-btn" data-action="sleep" aria-label="Sleep">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 12.5A7 7 0 1 1 7.5 4 7 7 0 0 0 16 12.5z"/><path d="M12 4v1M13.5 5h1M12.5 7h.5"/></svg>
          </button>
          <button class="radial-btn" data-action="feed" id="feed-btn" aria-label="Feed">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7.5"/><circle cx="7" cy="8" r="1.5"/><circle cx="12" cy="7.5" r="1"/><circle cx="9" cy="12.5" r="1"/><circle cx="12.5" cy="11" r="1"/></svg>
          </button>
          <span id="feed-timer" class="hidden"></span>
          <button class="radial-btn" data-action="walk-toggle" id="walk-btn" aria-label="Walk">
            <svg viewBox="0 0 313.486 313.486" width="20" height="20" fill="currentColor"><path d="M271.185 90.561c-.639 0-1.263.062-1.878.15-1.159-10.292-7.973-18.191-16.244-18.191-2.723 0-5.285.87-7.546 2.385.086-.783.144-1.576.144-2.385 0-10.902-8.04-19.724-17.977-19.724-4.457 0-8.525 1.785-11.664 4.727-1.313-12.218-11.706-21.736-24.337-21.736-13.521 0-24.483 10.904-24.483 24.353 0 5.941 2.141 11.382 5.696 15.607 2.735 3.25 2.618 8.012-.283 11.115-.002.002-.004.004-.006.006-7.356 7.874-9.04 19.493-4.221 29.132l11.783 23.567c16.319 32.637 19.004 70.42 7.465 105.038l-5.013 15.038c-4.158 12.475-2.066 26.188 5.622 36.855 7.688 10.667 20.036 16.989 33.186 16.989 14.178 0 26.008-8.278 34.798-19.401 28.104-35.566 28.104-184.484 28.104-190.261 0-7.33-5.882-13.262-13.149-13.262zM140.872 51.075c-2.901-3.103-3.018-7.865-.283-11.115 3.555-4.225 5.696-9.667 5.696-15.608C146.286 10.904 135.323 0 121.803 0c-12.632 0-23.024 9.519-24.337 21.736-3.14-2.942-7.207-4.727-11.664-4.727-9.937 0-17.977 8.822-17.977 19.724 0 .809.058 1.602.144 2.386-2.261-1.516-4.822-2.386-7.546-2.386-8.27 0-15.085 7.9-16.244 18.191-.615-.089-1.238-.15-1.878-.15-7.268 0-13.149 5.932-13.149 13.262 0 5.777 0 154.694 28.105 190.261 8.79 11.124 20.62 19.401 34.798 19.401 13.15 0 25.498-6.321 33.186-16.989 7.688-10.667 9.781-24.38 5.622-36.855l-5.013-15.038c-11.539-34.617-8.854-72.4 7.465-105.038l11.783-23.567c4.819-9.638 3.136-21.257-4.221-29.132-.002-.002-.004-.004-.006-.006zM46.114 170.194c-3.927-32.27-4.705-64.962-4.713-65.289-.094-4.141 3.186-7.573 7.327-7.668 4.167-.083 7.575 3.187 7.669 7.327.007.319.772 32.303 4.607 63.817.5 4.112-2.428 7.851-6.539 8.352-.308.037-.613.056-.916.056-3.937 0-7.172-2.791-7.635-6.595zM56.111 197.467c-3.983 0-7.212-3.229-7.212-7.212s3.229-7.212 7.212-7.212 7.212 3.229 7.212 7.212-3.229 7.212-7.212 7.212z"/></svg>
          </button>
          <button class="radial-btn hidden" data-action="ask" id="ask-btn" aria-label="Ask">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2a8 8 0 0 0-8 8c0 1.5.42 2.91 1.15 4.1l-.9 3.4 3.65-.92A8 8 0 1 0 10 2z"/><path d="M7 8h6M7 11h4"/></svg>
          </button>
        </div>

        <div id="settings-panel" class="hidden">
          <div class="settings-header">AI Settings</div>
          <div class="settings-row">
            <label>Provider</label>
            <select id="provider-select">
              <option value="openai">OpenAI</option>
              <option value="groq">Groq</option>
              <option value="openrouter">OpenRouter</option>
              <option value="anthropic">Claude</option>
              <option value="gemini">Gemini</option>
              <option value="deepseek">DeepSeek</option>
              <option value="mistral">Mistral</option>
              <option value="together">Together AI</option>
              <option value="perplexity">Perplexity</option>
              <option value="xai">xAI (Grok)</option>
              <option value="github">GitHub Models</option>
              <option value="custom">Custom</option>
            </select>
          </div>
            <div class="settings-row" id="custom-url-row" style="display:none">
              <label>Base URL</label>
              <div class="key-row">
                <input type="text" id="custom-url-input" placeholder="https://api.example.com/v1" />
              </div>
            </div>
          <div class="settings-row">
            <label>API Key</label>
            <input type="password" id="api-key-input" placeholder="sk-..." />
          </div>
          <div class="settings-row">
            <button id="verify-key-btn">Verify & Save</button>
            <span id="key-status"></span>
          </div>
          <div class="settings-row" id="model-row" style="display:none">
            <label>Model</label>
            <select id="model-select"></select>
            <input type="text" id="model-input" style="display:none;margin-top:3px" placeholder="Enter model name" />
          </div>
          <div class="settings-row settings-actions">
            <button id="settings-close-btn">Close</button>
          </div>
        </div>

        <div id="ask-input-container" class="hidden">
          <input type="text" id="ask-input" placeholder="Ask me anything..." />
          <button id="ask-send-btn">Send</button>
        </div>

        <div id="message-window">
          <div id="message-content"></div>
        </div>

        <div id="float-text-container"></div>

        <div id="xp-bar-container" class="hidden">
          <div id="xp-bar"><div id="xp-bar-fill"></div></div>
          <span id="xp-bar-text">Ур. 1</span>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="main.js"></script>
</body>
</html>
