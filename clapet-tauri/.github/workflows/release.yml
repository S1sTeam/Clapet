name: Release Multiplatform Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: ''
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: ''
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: |
          cd clapet-tauri
          npm install

      - name: Build Tauri App & Publish Artifacts to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./clapet-tauri
          tagName: v1.0.0-build2
          releaseName: 'v1.0.0 (BUILD #2)'
          releaseBody: |
            ## Downloads

            | Platform | Architecture | File |
            | --- | --- | --- |
            | Windows | x64 Setup | `Clapet_1.0.0_x64-setup.exe` |
            | Windows | x64 MSI (English) | `Clapet_1.0.0_x64_en-US.msi` |
            | Windows | x64 MSI (Русский) | `Clapet_1.0.0_x64_ru-RU.msi` |
            | macOS | Universal (ARM64 / x64) | `Clapet_1.0.0_universal.dmg` |
            | Linux | x64 | `Clapet_1.0.0_amd64.AppImage` / `.deb` |

            ---

            ## Changelog

            ### 🐾 What's New in v1.0.0 (BUILD #2):
            - ⚡ **Shake to Wake & Furious Red State** — Pet falls asleep on side. Grab & shake violently to wake up in angry red rage (`#ff2222`)!
            - 🎧 **Smart PC Audio Music Detector & Dance Party** — Clapet auto-detects real music (SoundCloud, Spotify, YouTube Music, VK, AIMP, MP3/FLAC) and grooves with musical note particles. Skips ads intelligently!
            - 🤖 **Custom System Prompt Enforcer** — Override Clapet's personality in AI settings!
            - 🤪 **Nihmadev 3000 Freak Easter Egg** — Type `Нихма` or `Nihma` into AI chat to trigger a 12-second crazy glitched freak mode!
            - 📐 **Dynamic Adaptive Window & 60 FPS LERP Eyes** — Zero invisible hitbox blocking; window expands dynamically for thought bubbles.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
